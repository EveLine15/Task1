<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Осень - описание месяцев</title>
    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/512/1995/1995575.png"
    />
  </head>
  <body>
    <div>
      <h1>🍂 Осень (Сентябрь, Октябрь, Ноябрь)</h1>
      <div>
        <a href="#september">🍁 Сентябрь</a>
        <a href="#october">🎃 Октябрь</a>
        <a href="#november">🌧️ Ноябрь</a>
      </div>
      <div id="september">
        <h2>Сентябрь</h2>
        <p>Начало осени. Бабье лето. Листья желтеют. День знаний.</p>
      </div>
      <div id="october">
        <h2>Октябрь</h2>
        <p>Листопад, заморозки. Первый снег. Время сбора последних грибов.</p>
      </div>
      <div id="november">
        <h2>Ноябрь</h2>
        <p>Предзимье. Слякоть, туманы. Природа готовится к зиме.</p>
      </div>
      <a href="index.html">← Вернуться к календарю</a>
    </div>
  </body>
</html>
